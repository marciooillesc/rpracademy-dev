<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro · RPR Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0f172a;--bg-2:#1e293b;--bg-3:#162032;
      --border:rgba(56,189,248,0.1);--border-strong:rgba(56,189,248,0.25);
      --primary:#38bdf8;--primary-dim:rgba(56,189,248,0.15);--primary-dark:#0ea5e9;
      --success:#34d399;--danger:#f87171;--warning:#fbbf24;
      --text:#e2e8f0;--text-2:#94a3b8;--text-3:#64748b;--text-inv:#0f172a;
      --radius:12px;--radius-sm:8px;--radius-lg:18px;
      --shadow-card:0 4px 24px rgba(0,0,0,0.35);
      --shadow-glow:0 0 32px rgba(56,189,248,0.15);
      --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
    }
    html{font-size:16px;-webkit-font-smoothing:antialiased;}
    body{
      font-family:var(--font-body);background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:2rem 1rem;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background-image:linear-gradient(rgba(56,189,248,0.04) 1px,transparent 1px),
        linear-gradient(90deg,rgba(56,189,248,0.04) 1px,transparent 1px);
      background-size:48px 48px;pointer-events:none;z-index:0;
    }
    body::after{
      content:'';position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);
      width:600px;height:600px;
      background:radial-gradient(circle,rgba(56,189,248,0.06) 0%,transparent 70%);
      pointer-events:none;z-index:0;
    }
    .card{
      position:relative;z-index:1;background:var(--bg-2);
      border:1px solid var(--border-strong);border-radius:var(--radius-lg);
      padding:2.5rem 2rem;width:100%;max-width:460px;
      box-shadow:var(--shadow-card),var(--shadow-glow);
      animation:entrar 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes entrar{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .logo{display:flex;align-items:center;gap:.75rem;margin-bottom:.4rem;}
    .logo__sigla{font-family:var(--font-display);font-weight:800;font-size:1.2rem;color:var(--primary);letter-spacing:.1em;}
    .logo__sep{width:1px;height:22px;background:var(--border-strong);}
    .logo__nome{font-family:var(--font-display);font-weight:600;font-size:.95rem;color:var(--text-2);}
    h1{font-family:var(--font-display);font-weight:800;font-size:1.6rem;color:var(--text);margin-bottom:.35rem;}
    .subtitulo{color:var(--text-2);font-size:.9rem;margin-bottom:1.75rem;}
    .aviso{
      background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.3);
      border-radius:var(--radius-sm);color:var(--warning);font-size:.82rem;
      padding:.65rem .9rem;margin-bottom:1.25rem;line-height:1.5;
    }
    .campo{margin-bottom:1rem;}
    .campo label{display:block;font-size:.78rem;font-weight:500;color:var(--text-2);margin-bottom:.4rem;letter-spacing:.04em;text-transform:uppercase;}
    .campo input{
      width:100%;background:var(--bg-3);border:1px solid var(--border);
      border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);
      font-size:.95rem;padding:.7rem .9rem;outline:none;
      transition:border-color .2s,box-shadow .2s;
    }
    .campo input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);}
    .campo input::placeholder{color:var(--text-3);}
    .tipo-grupo{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
    .tipo-opcao{
      display:flex;flex-direction:column;align-items:center;gap:.4rem;
      padding:.9rem;background:var(--bg-3);border:1px solid var(--border);
      border-radius:var(--radius-sm);cursor:pointer;
      transition:border-color .2s,background .2s;user-select:none;
    }
    .tipo-opcao:hover{border-color:var(--border-strong);background:#1a2a3a;}
    .tipo-opcao.selecionado{border-color:var(--primary);background:var(--primary-dim);}
    .tipo-opcao input{display:none;}
    .tipo-opcao__icon{font-size:1.75rem;}
    .tipo-opcao__label{font-size:.85rem;font-weight:600;color:var(--text-2);}
    .tipo-opcao.selecionado .tipo-opcao__label{color:var(--primary);}
    .msg{border-radius:var(--radius-sm);font-size:.85rem;padding:.65rem .9rem;margin-bottom:1rem;}
    .msg.erro{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,.3);color:var(--danger);}
    .msg.sucesso{background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,.3);color:var(--success);}
    .oculto{display:none!important;}
    .btn{
      width:100%;background:var(--primary);color:var(--text-inv);
      font-family:var(--font-display);font-weight:700;font-size:.95rem;
      border:none;border-radius:var(--radius-sm);padding:.8rem;cursor:pointer;
      transition:background .2s,transform .2s;margin-top:.5rem;
    }
    .btn:hover:not(:disabled){background:var(--primary-dark);transform:translateY(-1px);}
    .btn:disabled{opacity:.55;cursor:not-allowed;}
    .rodape{text-align:center;margin-top:1.5rem;font-size:.85rem;color:var(--text-2);}
    .rodape a{color:var(--primary);text-decoration:none;font-weight:500;}
    .rodape a:hover{text-decoration:underline;}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo__sigla">RPR</span>
    <div class="logo__sep"></div>
    <span class="logo__nome">Educação Digital</span>
  </div>
  <h1>Cadastro</h1>
  <p class="subtitulo">Crie sua conta para acessar a plataforma</p>

  <div class="aviso">⏳ Após o cadastro, aguarde a <strong>aprovação do administrador</strong> para acessar a área acadêmica.</div>

  <div id="msg" class="msg oculto"></div>

  <div class="campo">
    <label>Nome completo</label>
    <input id="nome" type="text" placeholder="Seu nome completo" autocomplete="name" />
  </div>
  <div class="campo">
    <label>E-mail</label>
    <input id="email" type="email" placeholder="seu@email.com" autocomplete="email" />
  </div>
  <div class="campo">
    <label>Senha</label>
    <input id="senha" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
  </div>
  <div class="campo">
    <label>Tipo de conta</label>
    <div class="tipo-grupo">
      <label class="tipo-opcao selecionado" id="op-aluno">
        <input type="radio" name="tipo" value="aluno" checked />
        <span class="tipo-opcao__icon">🎒</span>
        <span class="tipo-opcao__label">Aluno</span>
      </label>
      <label class="tipo-opcao" id="op-professor">
        <input type="radio" name="tipo" value="professor" />
        <span class="tipo-opcao__icon">👩‍🏫</span>
        <span class="tipo-opcao__label">Professor</span>
      </label>
    </div>
  </div>

  <button class="btn" id="btn">Criar conta</button>
  <div class="rodape">Já tem conta? <a href="/">Fazer login</a></div>
</div>

<script type="module">
import { supabase } from '../modules/supabase.js';

document.querySelectorAll('.tipo-opcao').forEach(label => {
  label.addEventListener('click', () => {
    document.querySelectorAll('.tipo-opcao').forEach(l => l.classList.remove('selecionado'));
    label.classList.add('selecionado');
  });
});

function msg(tipo, texto) {
  const el = document.getElementById('msg');
  el.className = `msg ${tipo}`;
  el.textContent = texto;
  el.classList.remove('oculto');
}

document.getElementById('btn').addEventListener('click', async () => {
  const nome  = document.getElementById('nome').value.trim();
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  const tipo  = document.querySelector('input[name="tipo"]:checked').value;

  document.getElementById('msg').classList.add('oculto');

  if (!nome || !email || !senha) return msg('erro', 'Preencha todos os campos.');
  if (senha.length < 6) return msg('erro', 'A senha precisa ter pelo menos 6 caracteres.');

  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Criando conta…';

  const { data, error } = await supabase.auth.signUp({ email, password: senha });

  if (error) {
    msg('erro', error.message);
    btn.disabled = false;
    btn.textContent = 'Criar conta';
    return;
  }

  const { error: erroInsert } = await supabase.from('usuarios').insert({
    id: data.user.id,
    nome, email, tipo, status: 'pendente'
  });

  if (erroInsert) {
    msg('erro', 'Erro ao salvar perfil: ' + erroInsert.message);
    btn.disabled = false;
    btn.textContent = 'Criar conta';
    return;
  }

  msg('sucesso', '✅ Cadastro enviado! Aguarde a aprovação do administrador para acessar.');
  btn.textContent = 'Cadastro enviado!';
});
</script>
</body>
</html>
